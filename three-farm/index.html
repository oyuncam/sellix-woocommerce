<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Three Farm - 3D Farming</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="hud">
      <div id="top-bar">
        <span id="time">06:00</span>
        <span id="coins">Altın: 0</span>
        <span id="seeds">Tohumlar: Buğday(5) Havuç(0) Mısır(0)</span>
        <span id="selected-seed">Seçili: Buğday</span>
      </div>
      <div id="prompt"></div>
      <div id="crosshair">+</div>
    </div>

    <div id="overlay">
      <div class="panel">
        <h1>Three Farm</h1>
        <p>Başlamak için tıklayın ve farenizi kilitleyin.</p>
        <ul>
          <li>WASD: Yürü</li>
          <li>Fare: Etrafına bak</li>
          <li>E: Ekim/Hasat</li>
          <li>Q veya 1-3: Tohum seç</li>
          <li>Esc: Kilidi çöz</li>
        </ul>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
  </html>
